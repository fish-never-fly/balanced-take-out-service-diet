<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日营养需求分析</title>
    <style>
      /* 全局颜色变量：统一控制背景、卡片、文字、强调色和边框颜色。 */
      :root {
        --bg: #f4f7f1;
        --card: rgba(255, 255, 255, 0.9);
        --ink: #203126;
        --muted: #68756c;
        --accent: #2f7d4a;
        --accent-dark: #205f36;
        --line: rgba(32, 49, 38, 0.13);
        --warning: #8a5417;
      }

      /* 让所有元素的宽高计算包含内边距和边框，减少布局尺寸偏差。 */
      * { box-sizing: border-box; }

      /* 页面基础样式：设置中文字体、文字颜色和柔和的渐变背景。 */
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 0%, rgba(102, 187, 106, 0.22), transparent 30%),
          radial-gradient(circle at 95% 90%, rgba(255, 193, 7, 0.13), transparent 32%),
          var(--bg);
      }

      /* 主内容容器限制最大宽度，并让各功能区按垂直方向排列。 */
      .shell {
        width: min(1080px, calc(100% - 32px));
        margin: 32px auto 56px;
        display: grid;
        gap: 20px;
      }

      /* 首页标题区与功能面板共用半透明卡片、圆角和阴影。 */
      .hero, .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 18px 55px rgba(32, 49, 38, 0.08);
        backdrop-filter: blur(12px);
      }

      .hero, .panel { padding: 26px; }

      /* 标题和说明文字的排版规则。 */
      h1, h2 { margin: 0; }
      h1 { font-size: clamp(2rem, 5vw, 3.4rem); letter-spacing: -0.04em; }
      h2 { margin-bottom: 8px; }

      p { margin: 10px 0 0; color: var(--muted); line-height: 1.65; }

      /* 自适应表单网格：屏幕变窄时输入框会自动换行。 */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 14px;
      }

      label { display: grid; gap: 8px; font-size: 0.95rem; }

      /* 输入框、下拉框和按钮采用统一尺寸与圆角。 */
      input, select, button {
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        font: inherit;
      }

      input, select { background: white; color: var(--ink); }

      /* 三高选项使用可换行的胶囊式复选框布局。 */
      .choices { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }

      .choice {
        display: inline-flex;
        grid-auto-flow: column;
        align-items: center;
        gap: 8px;
        padding: 10px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: white;
      }

      /* 主按钮使用绿色渐变；请求处理中通过 disabled 状态提示用户等待。 */
      button {
        margin-top: 18px;
        color: white;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled { opacity: 0.6; cursor: wait; }

      /* 状态区域用于显示计算进度、成功提示和错误信息。 */
      .status { min-height: 24px; margin-top: 14px; color: var(--warning); font-weight: 600; }

      /* 营养指标使用响应式卡片网格。 */
      .metrics {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 16px;
      }

      .metric {
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: white;
      }

      .metric strong { display: block; margin-top: 5px; font-size: 1.18rem; }
      .muted { color: var(--muted); }

      /* 推荐方案纵向排列，每张卡片展示两餐、总价格、营养合计和偏离信息。 */
      .recommendations { display: grid; gap: 14px; margin-top: 16px; }

      .plan {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: white;
      }

      .plan-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .plan-meals {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .meal { padding: 12px; border-radius: 14px; background: var(--bg); }
      .meal strong { display: block; margin-top: 4px; }
      .plan-details { margin-top: 12px; color: var(--muted); line-height: 1.7; }
      .breakfast-note { margin-top: 10px; color: var(--muted); font-size: 0.92rem; }
      .time-banner { margin-bottom: 16px; padding: 12px 14px; border-left: 4px solid var(--accent); background: white; }
      .time-banner strong { display: block; margin-bottom: 3px; }
      .mode-switch { display: flex; flex-wrap: wrap; gap: 10px; margin: 0 0 16px; }
      .mode-button { margin: 0; color: var(--accent-dark); background: white; }
      .mode-button.active { color: white; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); }
      .lunch-selection { margin-top: 16px; padding: 16px; border: 1px solid var(--line); background: white; }
      .lunch-selection[hidden] { display: none; }
    </style>
  </head>
  <body>
    <main class="shell">
      <!-- 顶部介绍区：说明页面用途，不收集或展示附近商家信息。 -->
      <section class="hero">
        <h1>每日营养需求分析</h1>
        <p>根据成年人的身高、体重、年龄、性别和健康情况，估算每日营养摄入参考范围。</p>
      </section>

      <!-- 身体信息输入区：五个基础字段和三个可选健康标记组成完整请求。 -->
      <section class="panel">
        <div class="time-banner">
          <strong id="current-time">正在获取当前北京时间...</strong>
          <span id="time-mode" class="muted">正在判断推荐模式。</span>
        </div>
        <div class="mode-switch" aria-label="推荐模式切换">
          <button id="two-meals-mode" class="mode-button active" type="button">午餐＋晚餐模式</button>
          <button id="dinner-only-mode" class="mode-button" type="button">仅晚餐模式</button>
        </div>
        <div class="grid">
          <!-- 数值范围与后端 NutritionRequest 的校验边界保持一致。 -->
          <label>身高（厘米）<input id="height" type="number" min="100" max="250" step="0.1" value="170" /></label>
          <label>体重（千克）<input id="weight" type="number" min="25" max="300" step="0.1" value="65" /></label>
          <label>年龄<input id="age" type="number" min="18" max="100" step="1" value="30" /></label>
          <label>
            性别
            <select id="sex"><option value="female">女</option><option value="male">男</option></select>
          </label>
          <label>
            日常活动水平
            <select id="activity-level">
              <option value="sedentary">久坐</option>
              <option value="moderate">适量运动</option>
              <option value="vigorous">剧烈运动</option>
            </select>
          </label>
          <label>
            今日早餐
            <select id="breakfast-preset">
              <option value="none">正在加载早餐组合...</option>
            </select>
          </label>
          <label id="budget-label">
            <span id="budget-label-text">午餐与晚餐预算上限（元）</span>
            <input id="budget" type="number" min="1" step="0.1" value="80" />
          </label>
        </div>
        <p id="breakfast-details" class="breakfast-note">早餐营养值将用于计算全天摄入。</p>

        <div id="lunch-selection" class="lunch-selection" hidden>
          <label>
            搜索已经吃过的午餐
            <input id="lunch-search" type="search" placeholder="输入菜名或商家名称" />
          </label>
          <label style="margin-top: 12px;">
            选择午餐
            <select id="lunch-item"><option value="">正在加载菜品...</option></select>
          </label>
        </div>

        <!-- 三高复选框默认不选中，勾选后会收紧对应营养物质的建议上限。 -->
        <div class="choices">
          <label class="choice"><input id="high-glucose" type="checkbox" />高血糖</label>
          <label class="choice"><input id="high-lipids" type="checkbox" />高血脂</label>
          <label class="choice"><input id="high-pressure" type="checkbox" />高血压</label>
        </div>

        <!-- 点击按钮后由 JavaScript 调用 POST /nutrition，并在下方渲染结果。 -->
        <button id="calculate-button" type="button">计算每日营养需求</button>
        <div id="status" class="status"></div>
        <div id="metrics" class="metrics"></div>
      </section>

      <!-- 推荐结果区：精确匹配时展示全部组合，否则展示加权偏离最小的三组。 -->
      <section class="panel">
        <h2 id="recommendation-title">午餐与晚餐推荐</h2>
        <p id="recommendation-summary">填写身体信息并计算后生成两餐外卖方案。</p>
        <div id="recommendations" class="recommendations"></div>
      </section>

    </main>

    <script>
      // 缓存页面元素引用，避免每次点击或渲染时重复查询 DOM。
      const calculateButton = document.getElementById("calculate-button");
      const status = document.getElementById("status");
      const metrics = document.getElementById("metrics");
      const recommendationSummary = document.getElementById("recommendation-summary");
      const recommendations = document.getElementById("recommendations");
      const breakfastPreset = document.getElementById("breakfast-preset");
      const breakfastDetails = document.getElementById("breakfast-details");
      const currentTime = document.getElementById("current-time");
      const timeMode = document.getElementById("time-mode");
      const lunchSelection = document.getElementById("lunch-selection");
      const lunchSearch = document.getElementById("lunch-search");
      const lunchItem = document.getElementById("lunch-item");
      const budgetLabelText = document.getElementById("budget-label-text");
      const recommendationTitle = document.getElementById("recommendation-title");
      const twoMealsModeButton = document.getElementById("two-meals-mode");
      const dinnerOnlyModeButton = document.getElementById("dinner-only-mode");
      let breakfastPresets = [];
      let menuItems = [];
      let dinnerOnlyMode = false;
      let manualRecommendationMode = null;

      // 把后端返回的 {min, max} 区间转换为适合页面显示的文本。
      function rangeText(value, unit) {
        return `${value.min}–${value.max} ${unit}`;
      }

      // 将营养接口结果整理成“标签 + 数值”数组，再批量生成指标卡片。
      function renderMetrics(payload) {
        // daily_targets 保存每日营养目标，body 保存 BMI 和基础代谢等身体指标。
        const targets = payload.daily_targets;
        const activityLabels = {
          sedentary: "久坐",
          moderate: "适量运动",
          vigorous: "剧烈运动",
        };
        const values = [
          ["BMI", `${payload.body.bmi}（${payload.body.bmi_category}）`],
          ["基础代谢", `${payload.body.basal_metabolic_rate_kcal} kcal`],
          ["活动水平", `${activityLabels[payload.input.activity_level]}（系数 ${payload.body.activity_factor}）`],
          ["预计每日消耗", `${payload.body.estimated_daily_expenditure_kcal} kcal`],
          ["每日热量", rangeText(targets.energy_kcal, "kcal")],
          ["蛋白质", rangeText(targets.protein_g, "g")],
          ["脂肪", rangeText(targets.fat_g, "g")],
          ["饱和脂肪上限", `${targets.saturated_fat_max_g} g`],
          ["碳水化合物", rangeText(targets.carbohydrate_g, "g")],
          ["膳食纤维", `${targets.dietary_fiber_g} g`],
          ["饮水量", rangeText(targets.water_ml, "ml")],
          ["钠上限", `${targets.sodium_max_mg} mg`],
          ["添加糖上限", `${targets.added_sugar_max_g} g`],
        ];
        // values 中的内容来自本程序计算结果，不包含用户输入的自由文本。
        metrics.innerHTML = values.map(([label, value]) =>
          `<div class="metric"><span class="muted">${label}</span><strong>${value}</strong></div>`
        ).join("");
      }

      // 把后端已经排序的方案完整渲染出来；exact 模式可能包含三种以上组合。
      function renderRecommendations(result) {
        const nutrientLabels = {
          energy_kcal: "热量",
          protein_g: "蛋白质",
          fat_g: "脂肪",
          carbohydrate_g: "碳水",
          fiber_g: "纤维",
          sodium_mg: "钠",
          added_sugar_g: "添加糖",
        };

        if (result.meal_mode === "dinner_only") {
          renderDinnerRecommendations(result, nutrientLabels);
          return;
        }

        const filter = result.candidate_filter;
        recommendationSummary.textContent =
          `早餐采用“${result.breakfast.name}”。营养近似筛选从 ${filter.original_count} 道菜中` +
          `保留 ${filter.retained_count} 道，删除 ${filter.removed_count} 道较贵菜。` +
          `预算上限 ¥${result.budget_yuan.toFixed(2)}，排除 ${result.over_budget_pairs_skipped} 个超预算组合，` +
          `另跳过 ${result.same_name_pairs_skipped} 个同名组合。` +
          `${result.message} 共考虑 ${result.evaluated_combinations} 个组合，` +
          `完整评分 ${result.fully_scored_combinations} 个，安全剪枝 ${result.pruned_combinations} 个。` +
          `满足条件共 ${result.exact_match_count} 个，本次展示精确方案 ${result.returned_exact_count} 个，` +
          `补充方案 ${result.supplemented_count} 个。`;

        recommendations.innerHTML = result.plans.map((plan, index) => {
          // 兜底方案按单项加权偏离从高到低展示前三个主要不足或超标项。
          const mainDeviations = Object.entries(plan.deviations)
            .filter(([, entry]) => entry.weighted_deviation > 0)
            .sort((left, right) => right[1].weighted_deviation - left[1].weighted_deviation)
            .slice(0, 3)
            .map(([key, entry]) =>
              `${nutrientLabels[key]}偏离 ${(entry.deviation_ratio * 100).toFixed(1)}%`
            )
            .join("；");

          const mealTotals = plan.meal_nutrition_totals;
          const dailyTotals = plan.daily_nutrition_totals;
          return `
            <article class="plan">
              <div class="plan-header">
                <strong>方案 ${index + 1}</strong>
                <strong>总价 ¥${plan.total_price_yuan.toFixed(2)}</strong>
              </div>
              <div class="plan-meals">
                <div class="meal">
                  <span class="muted">午餐 · ${plan.lunch.store_name}</span>
                  <strong>${plan.lunch.dish_name} · ¥${plan.lunch.price_yuan}</strong>
                  <span class="muted">午餐优先分 ${plan.meal_ordering.lunch_priority_score.toFixed(3)}，估算复合碳水 ${plan.meal_ordering.lunch_estimated_complex_carbohydrate_g} g</span>
                </div>
                <div class="meal">
                  <span class="muted">晚餐 · ${plan.dinner.store_name}</span>
                  <strong>${plan.dinner.dish_name} · ¥${plan.dinner.price_yuan}</strong>
                  <span class="muted">晚餐优先分 ${plan.meal_ordering.dinner_priority_score.toFixed(3)}，估算复合碳水 ${plan.meal_ordering.dinner_estimated_complex_carbohydrate_g} g</span>
                </div>
              </div>
              <div class="plan-details">
                午晚两餐：${mealTotals.energy_kcal} kcal，蛋白质 ${mealTotals.protein_g} g，
                脂肪 ${mealTotals.fat_g} g，碳水 ${mealTotals.carbohydrate_g} g。<br />
                含早餐全天：${dailyTotals.energy_kcal} kcal，蛋白质 ${dailyTotals.protein_g} g，
                脂肪 ${dailyTotals.fat_g} g，碳水 ${dailyTotals.carbohydrate_g} g，
                纤维 ${dailyTotals.fiber_g} g，钠 ${dailyTotals.sodium_mg} mg，
                添加糖 ${dailyTotals.added_sugar_g} g。<br />
                ${plan.is_exact_match
                  ? "完全满足当前营养条件。"
                  : `加权偏离系数：${plan.deviation_score.toFixed(4)}。主要偏离：${mainDeviations}`}
              </div>
            </article>
          `;
        }).join("");
      }

      // 14:30 后只展示已吃午餐和候选晚餐，全天总量包含早餐、午餐与晚餐。
      function renderDinnerRecommendations(result, nutrientLabels) {
        const filter = result.candidate_filter;
        recommendationSummary.textContent =
          `已吃午餐“${result.lunch.dish_name}”，早餐采用“${result.breakfast.name}”。` +
          `从 ${filter.original_count} 道晚餐候选中保留 ${filter.retained_count} 道，` +
          `删除 ${filter.removed_count} 道营养相近的较贵菜。` +
          `晚餐预算上限 ¥${result.budget_yuan.toFixed(2)}，排除 ${result.over_budget_items_skipped} 道超预算菜品。` +
          `${result.message} 满足条件共 ${result.exact_match_count} 道，本次展示精确方案 ` +
          `${result.returned_exact_count} 道，补充方案 ${result.supplemented_count} 道。`;

        recommendations.innerHTML = result.plans.map((plan, index) => {
          const mainDeviations = Object.entries(plan.deviations)
            .filter(([, entry]) => entry.weighted_deviation > 0)
            .sort((left, right) => right[1].weighted_deviation - left[1].weighted_deviation)
            .slice(0, 3)
            .map(([key, entry]) =>
              `${nutrientLabels[key]}偏离 ${(entry.deviation_ratio * 100).toFixed(1)}%`
            )
            .join("；");
          const dinnerNutrition = plan.dinner_nutrition;
          const dailyTotals = plan.daily_nutrition_totals;
          return `
            <article class="plan">
              <div class="plan-header">
                <strong>晚餐方案 ${index + 1}</strong>
                <strong>¥${plan.dinner_price_yuan.toFixed(2)}</strong>
              </div>
              <div class="meal">
                <span class="muted">${plan.dinner.store_name}</span>
                <strong>${plan.dinner.dish_name}</strong>
                <span class="muted">
                  ${dinnerNutrition.energy_kcal} kcal · 蛋白质 ${dinnerNutrition.protein_g} g ·
                  脂肪 ${dinnerNutrition.fat_g} g · 碳水 ${dinnerNutrition.carbohydrate_g} g
                </span>
              </div>
              <div class="plan-details">
                含早餐和午餐的全天摄入：${dailyTotals.energy_kcal} kcal，
                蛋白质 ${dailyTotals.protein_g} g，脂肪 ${dailyTotals.fat_g} g，
                碳水 ${dailyTotals.carbohydrate_g} g，纤维 ${dailyTotals.fiber_g} g，
                钠 ${dailyTotals.sodium_mg} mg，添加糖 ${dailyTotals.added_sugar_g} g。<br />
                ${plan.is_exact_match
                  ? "完全满足当前全天营养条件。"
                  : `加权偏离系数：${plan.deviation_score.toFixed(4)}。主要偏离：${mainDeviations}`}
              </div>
            </article>
          `;
        }).join("");
      }

      // 读取表单、发送营养与推荐请求，并负责请求期间的按钮和状态变化。
      async function calculateNutrition() {
        if (dinnerOnlyMode && !lunchItem.value) {
          status.textContent = "仅晚餐模式下，请先选择已经吃过的午餐。";
          lunchItem.focus();
          return;
        }
        // 禁用按钮可避免用户快速重复提交；同时清空上一次结果。
        calculateButton.disabled = true;
        status.textContent = "正在计算...";
        metrics.innerHTML = "";
        recommendations.innerHTML = "";
        recommendationSummary.textContent = dinnerOnlyMode
          ? "正在根据早餐和已吃午餐评估晚餐..."
          : "正在评估午餐和晚餐组合...";
        try {
          // /recommendations 同时返回营养分析和外卖组合，避免前端自行复制评分算法。
          const response = await fetch("/recommendations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            // 将 HTML 输入值转换为明确的数字、字符串和布尔值后再序列化为 JSON。
            body: JSON.stringify({
              height_cm: Number(document.getElementById("height").value),
              weight_kg: Number(document.getElementById("weight").value),
              age: Number(document.getElementById("age").value),
              sex: document.getElementById("sex").value,
              activity_level: document.getElementById("activity-level").value,
              breakfast_id: breakfastPreset.value,
              budget_yuan: Number(document.getElementById("budget").value),
              high_blood_glucose: document.getElementById("high-glucose").checked,
              high_blood_lipids: document.getElementById("high-lipids").checked,
              high_blood_pressure: document.getElementById("high-pressure").checked,
              lunch_item_id: dinnerOnlyMode ? lunchItem.value : null,
              recommendation_mode: dinnerOnlyMode ? "dinner_only" : "two_meals",
            }),
          });

          // 无论成功还是失败，FastAPI 都返回 JSON；非成功状态转为异常统一处理。
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "计算失败");
          renderMetrics(payload.nutrition);
          applyTimeMode(payload.time);
          renderRecommendations(payload.recommendation);
          status.textContent = "计算完成。结果为通用参考，不替代医生或营养师建议。";
        } catch (error) {
          // 网络失败或后端校验失败时，在状态区域展示错误消息。
          status.textContent = error.message;
          recommendationSummary.textContent = "推荐方案生成失败。";
        } finally {
          // 请求结束后恢复按钮，无论请求成功还是失败都允许用户再次计算。
          calculateButton.disabled = false;
        }
      }

      // 从后端加载经典早餐组合，避免前端重复维护营养估算值。
      async function loadBreakfastPresets() {
        try {
          const response = await fetch("/breakfast-presets");
          breakfastPresets = await response.json();
          breakfastPreset.innerHTML = breakfastPresets.map((preset) =>
            `<option value="${preset.id}">${preset.name}</option>`
          ).join("");

          // 默认选择较均衡的“豆浆＋鸡蛋＋全麦面包”。
          breakfastPreset.value = "soy_egg_bread";
          renderBreakfastDetails();
        } catch (error) {
          breakfastPreset.innerHTML = '<option value="none">未吃早餐</option>';
          breakfastDetails.textContent = "早餐组合加载失败，将按未吃早餐计算。";
        }
      }

      // 展示当前早餐的份量假设和主要营养值，让用户理解估算依据。
      function renderBreakfastDetails() {
        const preset = breakfastPresets.find((item) => item.id === breakfastPreset.value);
        if (!preset) return;
        const nutrition = preset.nutrition;
        breakfastDetails.textContent =
          `${preset.serving_description}；估算 ${nutrition.energy_kcal} kcal，` +
          `蛋白质 ${nutrition.protein_g} g，脂肪 ${nutrition.fat_g} g，` +
          `碳水 ${nutrition.carbohydrate_g} g，纤维 ${nutrition.fiber_g} g，` +
          `钠 ${nutrition.sodium_mg} mg，添加糖 ${nutrition.added_sugar_g} g。`;
      }

      // 一次读取完整模拟菜单，供仅晚餐模式搜索和选择已经吃过的午餐。
      async function loadMenuItems() {
        try {
          const response = await fetch("/menu-items?limit=1000");
          menuItems = await response.json();
          renderLunchOptions("");
        } catch (error) {
          lunchItem.innerHTML = '<option value="">菜品加载失败</option>';
        }
      }

      // 根据菜名或商家名称过滤午餐下拉框，保留已经选择的菜品 ID。
      function renderLunchOptions(searchText) {
        const selectedId = lunchItem.value;
        const keyword = searchText.trim().toLocaleLowerCase("zh-CN");
        const filtered = menuItems.filter((item) =>
          !keyword || `${item.dish_name} ${item.store_name}`.toLocaleLowerCase("zh-CN").includes(keyword)
        );
        lunchItem.innerHTML = [
          '<option value="">请选择已经吃过的午餐</option>',
          ...filtered.slice(0, 200).map((item) =>
            `<option value="${item.id}">${item.dish_name} · ${item.store_name} · ¥${item.price_yuan}</option>`
          ),
        ].join("");
        if (filtered.some((item) => item.id === selectedId)) lunchItem.value = selectedId;
      }

      // 更新推荐模式对应的表单、标题、按钮状态和说明文字。
      function setRecommendationMode(mode, manual = false) {
        const nextDinnerOnlyMode = mode === "dinner_only";
        const modeChanged = dinnerOnlyMode !== nextDinnerOnlyMode;
        dinnerOnlyMode = nextDinnerOnlyMode;
        if (manual) manualRecommendationMode = mode;
        twoMealsModeButton.classList.toggle("active", !dinnerOnlyMode);
        dinnerOnlyModeButton.classList.toggle("active", dinnerOnlyMode);
        twoMealsModeButton.setAttribute("aria-pressed", String(!dinnerOnlyMode));
        dinnerOnlyModeButton.setAttribute("aria-pressed", String(dinnerOnlyMode));
        if (modeChanged) {
          recommendations.innerHTML = "";
          metrics.innerHTML = "";
          status.textContent = "";
        }
        if (dinnerOnlyMode) {
          lunchSelection.hidden = false;
          budgetLabelText.textContent = "晚餐预算上限（元）";
          recommendationTitle.textContent = "晚餐推荐";
          if (!recommendations.children.length) {
            recommendationSummary.textContent = "选择已经吃过的午餐后生成晚餐方案。";
          }
          calculateButton.textContent = "根据已吃午餐推荐晚餐";
        } else {
          timeMode.textContent = "尚未晚于 14:30，系统将同时推荐午餐和晚餐。";
          lunchSelection.hidden = true;
          budgetLabelText.textContent = "午餐与晚餐预算上限（元）";
          recommendationTitle.textContent = "午餐与晚餐推荐";
          if (!recommendations.children.length) {
            recommendationSummary.textContent = "填写身体信息并计算后生成两餐外卖方案。";
          }
          calculateButton.textContent = "计算每日营养需求";
        }
      }

      // 时间模式只作为默认值；用户点击切换按钮后，时间刷新不会覆盖手动选择。
      function applyTimeMode(timePayload) {
        currentTime.textContent = `当前北京时间：${timePayload.display_time}`;
        const automaticMode = timePayload.is_after_lunch_cutoff ? "dinner_only" : "two_meals";
        if (manualRecommendationMode === null) {
          setRecommendationMode(automaticMode);
          timeMode.textContent = timePayload.is_after_lunch_cutoff
            ? "已晚于 14:30，默认使用仅晚餐模式；也可以手动切换。"
            : "尚未晚于 14:30，默认使用午餐＋晚餐模式；也可以手动切换。";
        } else {
          const manualLabel = manualRecommendationMode === "dinner_only" ? "仅晚餐" : "午餐＋晚餐";
          const automaticLabel = automaticMode === "dinner_only" ? "仅晚餐" : "午餐＋晚餐";
          timeMode.textContent = `当前已手动选择“${manualLabel}”模式；按时间自动建议为“${automaticLabel}”。`;
        }
      }

      // 时间由后端统一按 Asia/Shanghai 时区提供，页面每分钟刷新一次模式。
      async function loadCurrentTime() {
        try {
          const response = await fetch("/current-time");
          const payload = await response.json();
          if (!response.ok) throw new Error("时间获取失败");
          applyTimeMode(payload);
        } catch (error) {
          currentTime.textContent = "当前时间获取失败";
          timeMode.textContent = "时间获取失败，可使用下方按钮手动选择推荐模式。";
          if (manualRecommendationMode === null) setRecommendationMode("two_meals");
        }
      }

      // 注册按钮点击事件，并在页面脚本加载完成后立即获取模拟菜单预览。
      calculateButton.addEventListener("click", calculateNutrition);
      breakfastPreset.addEventListener("change", renderBreakfastDetails);
      lunchSearch.addEventListener("input", () => renderLunchOptions(lunchSearch.value));
      twoMealsModeButton.addEventListener("click", () => {
        setRecommendationMode("two_meals", true);
        timeMode.textContent = "当前已手动选择“午餐＋晚餐”模式。";
      });
      dinnerOnlyModeButton.addEventListener("click", () => {
        setRecommendationMode("dinner_only", true);
        timeMode.textContent = "当前已手动选择“仅晚餐”模式。";
      });
      loadBreakfastPresets();
      loadMenuItems();
      loadCurrentTime();
      setInterval(loadCurrentTime, 60000);
    </script>
  </body>
</html>
